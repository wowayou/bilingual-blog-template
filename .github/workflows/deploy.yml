name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || vars.CLOUDFLARE_DEPLOY_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check deployment configuration
        run: |
          set -euo pipefail
          missing=0
          for name in SITE_URL CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is required for deployment"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "Configure the required GitHub Variables and Secrets before running Deploy."
            exit 1
          fi
        env:
          SITE_URL: ${{ vars.SITE_URL }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Build
        run: npm run build
        env:
          SITE_URL: ${{ vars.SITE_URL }}
          PUBLIC_GISCUS_ENABLED: ${{ vars.PUBLIC_GISCUS_ENABLED }}
          PUBLIC_GISCUS_REPO: ${{ vars.PUBLIC_GISCUS_REPO }}
          PUBLIC_GISCUS_REPO_ID: ${{ vars.PUBLIC_GISCUS_REPO_ID }}
          PUBLIC_GISCUS_CATEGORY: ${{ vars.PUBLIC_GISCUS_CATEGORY }}
          PUBLIC_GISCUS_CATEGORY_ID: ${{ vars.PUBLIC_GISCUS_CATEGORY_ID }}
          PUBLIC_GISCUS_THEME: ${{ vars.PUBLIC_GISCUS_THEME }}

      - name: Deploy to Cloudflare Workers
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Verify production routes
        run: |
          set -euo pipefail
          BASE="${SITE_URL%/}"
          curl -fsSL "$BASE/" >/dev/null
          curl -fsSL "$BASE/zh/" >/dev/null
          curl -fsSL "$BASE/zh/about/" >/dev/null
          curl -fsSL "$BASE/zh/blog/" >/dev/null
          curl -fsSL "$BASE/zh/rss.xml/" >/dev/null
          curl -fsSL "$BASE/sitemap-index.xml" >/dev/null
        env:
          SITE_URL: ${{ vars.SITE_URL }}
